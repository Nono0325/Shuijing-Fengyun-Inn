{% extends 'base.html' %}

{% block title %}{{ event.title }} - 水井村風雲客棧{% endblock %}

{% block content %}
<section class="py-5 bg-white">
    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'inn_app:home' %}">首頁</a></li>
                        <li class="breadcrumb-item"><a href="{% url 'inn_app:event_list' %}">活動列表</a></li>
                        <li class="breadcrumb-item active" aria-current="page">{{ event.title }}</li>
                    </ol>
                </nav>

                <div class="card shadow-lg p-5 rounded-4">
                    <div class="d-flex align-items-center mb-4">
                        <span class="badge bg-primary rounded-pill px-4 py-2 me-3 fs-5">
                            <i class="fa-solid fa-calendar-days me-2"></i>{{ event.date|date:"Y年m月d日" }}
                        </span>
                        <h1 class="display-5 fw-bold mb-0">{{ event.title }}</h1>
                    </div>
                    <hr class="my-4">
                    <div class="event-content lead text-muted" style="line-height: 2;">
                        {{ event.description|linebreaks }}
                    </div>
                    <div class="mt-5 text-center">
                        <a href="{% url 'inn_app:event_list' %}" class="btn btn-outline-secondary rounded-pill px-5">
                            <i class="fa-solid fa-arrow-left me-2"></i>返回活動列表
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
