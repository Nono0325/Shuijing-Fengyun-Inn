services:
  - type: web
    name: fengyun-inn
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn fengyun.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fengyun-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: fengyun-db
    plan: free
